version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mpwa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-mpwa}
      MYSQL_USER: ${DB_USERNAME:-mpwa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mpwa_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mpwa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mpwa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mpwa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  mpwa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpwa-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mpwa}
      DB_USERNAME: ${DB_USERNAME:-mpwa}
      DB_PASSWORD: ${DB_PASSWORD:-mpwa_password}
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      PORT_NODE: ${PORT_NODE:-3000}
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${PORT_NODE:-3000}:3000"
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./credentials:/app/credentials
    networks:
      - mpwa-network
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000 & node server.js"

volumes:
  mysql_data:
  redis_data:

networks:
  mpwa-network:
    driver: bridge
